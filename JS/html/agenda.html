<!DOCTYPE html>
<html lang="es">
    <link rel="stylesheet" href="/JS/css/agenda.css">
    <script src="/JS/js/agenda.js"></script>
<head>
    <title>Agenda</title>
</head>
<body>
<div class="container">
    <h2>Registro de Usuarios</h2>
    
    <div class="form-group">
        <label for="dni">Documento Nacional de Identidad</label>
        <input type="text" id="dni" placeholder="Ej: 12345678A">
    </div>

    <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" placeholder="Nombre y Apellidos">
    </div>

    <div class="actions">
        <button class="btn-primary" onclick="registrar()">Registrar Alta</button>
        <button class="btn-secondary" onclick="listar()">Ver Listado</button>
    </div>

    <div id="listaUsuarios">
    </div>
</div>
</body>
</html>
