<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hoja de Inscripción - Junta Oficial</title>
    <link rel="stylesheet" href="../css/pt3act1.css">
    <script src="../js/boletin5pt3act1.js" defer></script>
</head>
<body>

<h1 class="titulo">HOJA DE INSCRIPCIÓN</h1>
<h2 class="subtitulo">SISTEMA DE GESTIÓN DE CICLOS FORMATIVOS</h2>

<form class="formulario" onsubmit="event.preventDefault()">
    <fieldset class="bloque">
        <legend>Datos Personales</legend>

        <div class="fila">
            <label>Nombre:
                <input type="text" id="nombre" placeholder="Ej: Javier">
            </label>
            <label>Apellidos:
                <input type="text" id="apellidos" placeholder="Ej: García López">
            </label>
            <label>Fecha de Nacimiento:
                <input type="date" id="fechaNacimiento">
            </label>
        </div>
    </fieldset>

    <div class="botones">
        <button type="button" class="btn-enviar" onclick="actv1()">Procesar Inscripción</button>
        <button type="reset" class="btn-limpiar">Limpiar</button>
    </div>
</form>

<div id="mesaje"></div>

</body>
</html>
