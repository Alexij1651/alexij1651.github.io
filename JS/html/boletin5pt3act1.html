<h1 class="titulo">HOJA DE INSCRIPCIÓN</h1>

<form class="formulario">

    <!-- DATOS PERSONALES -->
    <fieldset class="bloque gris">
        <legend>Datos Personales</legend>

        <div class="fila">
            <label id="nombre">Nombre:<br>
                <input type="text">
            </label><br>
            <label>Apellidos:<br>
                <input type="text">
            </label><br>
        <label id="edad">Edad:<br>
            <input type="text">
        </label>
        </div>
    </fieldset>
    <div class="botones">
        <button type="submit">Enviar Solicitud</button>
        <button type="reset">Limpiar datos</button>
    </div>
</form>

<p id="mesaje"></p>
<button id="boton" onclick="actv1()">Actividad</button>
