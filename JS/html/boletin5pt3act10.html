<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 3 Act10 - Comparar Palabras</title>
    <link rel="stylesheet" href="../css/pt3act10.css">
    <script src="../js/boletin5pt3act10.js" defer></script>
</head>
<body>

<h1 class="titulo">COMPARAR PALABRAS</h1>
<h2 class="subtitulo">Actividad 10 - Comparación de longitudes</h2>

<form class="formulario" onsubmit="event.preventDefault()">
    <fieldset class="bloque">
        <legend>Introduce dos palabras</legend>

        <div class="fila">
            <label>Palabra 1:
                <input type="text" id="palabra1" placeholder="Ej: Hola">
            </label>
            <label>Palabra 2:
                <input type="text" id="palabra2" placeholder="Ej: Mundo">
            </label>
        </div>
    </fieldset>

    <div class="botones">
        <button type="button" class="btn-enviar" onclick="actv10()">Comparar</button>
        <button type="reset" class="btn-limpiar">Limpiar</button>
    </div>
</form>

</body>
</html>
