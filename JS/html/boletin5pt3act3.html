<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 3 Act3 - Estaciones del Año</title>
    <link rel="stylesheet" href="../css/pt3act3.css">
    <script src="../js/boletin5pt3act3.js" defer></script>

<body>

<h1 class="titulo">ESTACIONES DEL AÑO</h1>
<h2 class="subtitulo">Actividad 3 - Arrays en JavaScript</h2>

<form class="formulario" onsubmit="event.preventDefault()">
    <fieldset class="bloque">
        <legend>Introduce un Número</legend>

        <div class="fila">
            <label>Número (1-4):
                <input type="number" id="numero" placeholder="Ej: 2" min="1" max="4">
            </label>
        </div>
    </fieldset>

    <div class="botones">
        <button type="button" class="btn-enviar" onclick="actv3()">Ver Estación</button>
        <button type="reset" class="btn-limpiar" onclick="document.getElementById('resultado').innerHTML=''">Limpiar</button>
    </div>
</form>

<div id="resultado"></div>

</body>
</html>
